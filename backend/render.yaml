services:
  - type: web
    name: scanner-api
    env: python
    buildCommand: "pip install -r ./backend/requirements.txt"

    # IMPORTANT: Render builds app under /opt/render/project/src.
    # Our FastAPI entrypoint is at backend/main.py, so the module path from the repo root is backend.main:app.
    workingDirectory: "."
    startCommand: "python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT"







